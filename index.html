<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            color: #fff;
        }
        .tools-list {
            list-style: none;
        }
        .tools-list li {
            margin-bottom: 0.75rem;
        }
        .tools-list a {
            display: block;
            padding: 1rem 1.25rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #7eb8da;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .tools-list a:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            transform: translateX(4px);
        }
        .tool-name {
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
        .tool-desc {
            font-size: 0.85rem;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠 Tools</h1>
        <ul class="tools-list">
            <li>
                <a href="dashboard.html">
                    <div class="tool-name">Morning Dashboard</div>
                    <div class="tool-desc">Weather and Reds updates in a TUI style</div>
                </a>
            </li>
            <li>
                <a href="solarized.html">
                    <div class="tool-name">Solarized Palette Selector</div>
                    <div class="tool-desc">Color picker for Solarized theme design</div>
                </a>
            </li>
            <li>
                <a href="ai-capabilities-ranking.html">
                    <div class="tool-name">AI Capabilities Ranking</div>
                    <div class="tool-desc">Tiered ranking of AI model companies — April 2026</div>
                </a>
            </li>
        </ul>
    </div>
</body>
</html>
