<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Morning Dashboard</title>
    <meta name="description" content="Morning dashboard with weather and sports">
    <meta name="theme-color" content="#002b36" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#fdf6e3" media="(prefers-color-scheme: light)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dashboard">
    <link rel="manifest" href="dashboard-manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23002b36' width='100' height='100' rx='20'/><text x='50' y='68' text-anchor='middle' font-size='50' font-family='monospace' fill='%2393a1a1'>▸_</text></svg>">
    <style>
        :root {
            --base03:#002b36;--base02:#073642;--base01:#586e75;--base00:#657b83;
            --base0:#839496;--base1:#93a1a1;--base2:#eee8d5;--base3:#fdf6e3;
            --yellow:#b58900;--orange:#cb4b16;--red:#dc322f;--magenta:#d33682;
            --violet:#6c71c4;--blue:#268bd2;--cyan:#2aa198;--green:#859900;
            --bg:var(--base03);--bg-hl:var(--base02);
            --fg:var(--base0);--fg-dim:var(--base01);
            --fg-em:var(--base1);--border:var(--base01);
        }
        @media(prefers-color-scheme:light){:root{
            --bg:var(--base3);--bg-hl:var(--base2);
            --fg:var(--base00);--fg-dim:var(--base1);
            --fg-em:var(--base01);--border:var(--base1);
        }}
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Courier New',Courier,monospace;
            background:var(--bg);color:var(--fg);
            font-size:14px;line-height:1.5;
            min-height:100vh;min-height:100dvh;
            padding:env(safe-area-inset-top) 8px 8px 8px;
            -webkit-text-size-adjust:100%;
        }
        .term{border:1px solid var(--border);max-width:500px;margin:0 auto;overflow:hidden}
        .titlebar{background:var(--bg-hl);padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .titlebar-left{color:var(--green);font-weight:bold}
        .titlebar-left .prompt{color:var(--cyan)}
        .titlebar-right{color:var(--fg-dim);font-size:13px;text-align:right}
        .titlebar-right .date{color:var(--yellow)}
        .section{border-top:1px solid var(--border)}
        .section-head{background:var(--bg-hl);padding:8px 14px;border-bottom:1px solid var(--border);color:var(--blue);font-weight:bold;font-size:13px;letter-spacing:1px;display:flex;justify-content:space-between}
        .section-head .sub{color:var(--fg-dim);font-weight:normal;letter-spacing:0}
        .section-body{padding:12px 14px}
        a.wx-link{display:block;text-decoration:none;color:inherit;-webkit-tap-highlight-color:transparent}
        .wx-hero{display:flex;align-items:center;gap:12px;margin-bottom:10px}
        .wx-icon{font-size:42px;line-height:1}
        .wx-info{flex:1}
        .wx-condition{color:var(--yellow);font-weight:bold;font-size:16px}
        .wx-temps{display:flex;gap:14px;margin-top:4px;font-size:14px}
        .wx-hi{color:var(--orange);font-weight:bold}
        .wx-lo{color:var(--blue);font-weight:bold}
        .wx-rain-pct{color:var(--cyan);font-weight:bold}
        .rain-box{border:1px solid var(--border);padding:8px 10px;margin-top:10px}
        .rain-title{color:var(--fg-dim);font-size:11px;margin-bottom:4px;letter-spacing:.5px}
        .rain-chart{white-space:pre;line-height:1.2;font-size:16px;letter-spacing:1px}
        .rain-labels{color:var(--fg-dim);font-size:11px;white-space:pre;margin-top:2px}
        .rain-lo{color:var(--green)}.rain-md{color:var(--yellow)}.rain-hi{color:var(--orange)}.rain-ex{color:var(--red)}
        .game-card{border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
        .game-card:last-child{margin-bottom:0}
        .game-card-head{background:var(--bg-hl);padding:5px 10px;border-bottom:1px solid var(--border);color:var(--fg-dim);font-size:12px;letter-spacing:.5px;display:flex;justify-content:space-between}
        .game-card-body{padding:10px}
        .score-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:14px}
        .score-team{width:34px;font-weight:bold;flex-shrink:0}
        .score-bar-track{flex:1;height:14px;background:var(--bg-hl);border:1px solid var(--border);overflow:hidden}
        .score-bar-fill{height:100%}
        .score-num{width:24px;text-align:right;font-weight:bold;flex-shrink:0}
        .team-cin{color:var(--red)}.team-lal{color:var(--violet)}.team-uk{color:var(--blue)}.team-mia{color:var(--cyan)}.team-opp{color:var(--fg-em)}
        .game-meta{color:var(--fg-dim);font-size:13px;margin-top:8px;line-height:1.6}
        .game-meta .pitcher{color:var(--violet)}
        .game-meta .result-w{color:var(--green);font-weight:bold}
        .game-meta .result-l{color:var(--red);font-weight:bold}
        .game-meta .time{color:var(--yellow)}
        .game-meta .venue{color:var(--fg-dim)}
        .matchup{display:flex;align-items:center;justify-content:center;gap:10px;padding:6px 0 8px;font-size:18px;font-weight:bold}
        .matchup-vs{color:var(--fg-dim);font-size:12px;font-weight:normal}
        .matchup-venue{text-align:center;color:var(--fg-dim);font-size:12px;margin-bottom:8px}
        .pitchers-box{border-top:1px dashed var(--border);padding-top:8px;margin-top:4px}
        .pitcher-row{display:flex;gap:8px;font-size:13px;margin-bottom:3px}
        .pitcher-team{width:34px;font-weight:bold;flex-shrink:0}
        .pitcher-name{color:var(--violet)}
        .foot{border-top:1px solid var(--border);background:var(--bg-hl);padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
        .foot-time{color:var(--fg-dim);font-size:12px}
        .refresh-btn{background:none;border:1px solid var(--border);color:var(--cyan);font-family:inherit;font-size:13px;padding:4px 14px;cursor:pointer}
        .refresh-btn:active{background:var(--bg)}
        .loading{color:var(--fg-dim);animation:blink 1s step-end infinite}
        @keyframes blink{50%{opacity:0}}
        .error{color:var(--red)}
        .none{color:var(--fg-dim);font-style:italic}
        .cal-event{border-left:3px solid var(--cyan);padding:4px 0 4px 10px;margin-bottom:8px}
        .cal-event:last-child{margin-bottom:0}
        .cal-time{color:var(--yellow);font-size:13px;font-weight:bold}
        .cal-title{color:var(--fg-em);font-size:14px}
        .cal-loc{color:var(--fg-dim);font-size:12px}
        .cal-allday{border-left-color:var(--violet)}
        .cal-now{border-left-color:var(--green);background:var(--bg-hl);margin-left:-10px;padding-left:20px;margin-right:-10px;padding-right:10px}
        .cal-past .cal-time,.cal-past .cal-title{opacity:0.5}
        .cal-setup{font-size:12px;line-height:1.8}
        .cal-setup code{background:var(--bg-hl);padding:2px 4px;font-size:11px}
        .hidden{display:none}
    </style>
</head>
<body>
    <div class="term">
        <div class="titlebar">
            <div class="titlebar-left"><span class="prompt">▸</span> morning-dashboard</div>
            <div class="titlebar-right" id="titlebar-right"></div>
        </div>
        <div class="section">
            <div class="section-head"><span>WEATHER</span><span class="sub">Prospect, KY</span></div>
            <div class="section-body" id="weather-body"><span class="loading">loading...</span></div>
        </div>
        <div class="section hidden" id="calendar-section">
            <div class="section-head"><span>SCHEDULE</span><span class="sub">Today</span></div>
            <div class="section-body" id="calendar-body"></div>
        </div>
        <div class="section hidden" id="reds-section">
            <div class="section-head"><span>REDS</span><span class="sub">Cincinnati</span></div>
            <div class="section-body" id="reds-body"></div>
        </div>
        <div class="section hidden" id="lakers-section">
            <div class="section-head"><span>LAKERS</span><span class="sub">Los Angeles</span></div>
            <div class="section-body" id="lakers-body"></div>
        </div>
        <div class="section hidden" id="dolphins-section">
            <div class="section-head"><span>DOLPHINS</span><span class="sub">Miami</span></div>
            <div class="section-body" id="dolphins-body"></div>
        </div>
        <div class="section hidden" id="ukbball-section">
            <div class="section-head"><span>KENTUCKY</span><span class="sub">Basketball</span></div>
            <div class="section-body" id="ukbball-body"></div>
        </div>
        <div class="section hidden" id="ukfball-section">
            <div class="section-head"><span>KENTUCKY</span><span class="sub">Football</span></div>
            <div class="section-body" id="ukfball-body"></div>
        </div>
        <div class="foot">
            <span class="foot-time" id="foot-time"></span>
            <button class="refresh-btn" onclick="loadAll()">[ refresh ]</button>
        </div>
    </div>

    <script>
    const LAT=38.40,LON=-85.61,REDS_ID=113,TZ='America/New_York';
    // ESPN team IDs
    const ESPN={
        LAKERS:'13',DOLPHINS:'15',UK_BBALL:'96',UK_FBALL:'96'
    };

    const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
    const todayStr=()=>new Date().toLocaleDateString('en-CA',{timeZone:TZ});
    const yesterdayStr=()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toLocaleDateString('en-CA',{timeZone:TZ})};
    function dateOffset(days){const d=new Date();d.setDate(d.getDate()+days);return d.toLocaleDateString('en-CA',{timeZone:TZ}).replace(/-/g,'')}

    function renderHeader(){
        const now=new Date();
        const date=now.toLocaleDateString('en-US',{timeZone:TZ,weekday:'short',month:'short',day:'numeric'});
        const time=now.toLocaleTimeString('en-US',{timeZone:TZ,hour:'numeric',minute:'2-digit'});
        document.getElementById('titlebar-right').innerHTML=`<span class="date">${esc(date)}</span> · ${esc(time)}`;
        document.getElementById('foot-time').textContent=`refreshed ${time}`;
    }

    /* ═══ WEATHER ═══ */
    const WMO={0:'Clear',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',45:'Fog',48:'Fog',51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',56:'Freezing Drizzle',57:'Freezing Drizzle',61:'Light Rain',63:'Rain',65:'Heavy Rain',66:'Freezing Rain',67:'Freezing Rain',71:'Light Snow',73:'Snow',75:'Heavy Snow',77:'Snow Grains',80:'Light Showers',81:'Showers',82:'Heavy Showers',85:'Snow Showers',86:'Snow Showers',95:'Thunderstorm',96:'T-Storm + Hail',99:'T-Storm + Hail'};
    const WMO_ART={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',56:'🌧️',57:'🌧️',61:'🌦️',63:'🌧️',65:'🌧️',66:'🌧️',67:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',77:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',85:'🌨️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️'};

    function rainBlock(pct){
        const blocks=' ▁▂▃▄▅▆▇█';
        const i=Math.min(8,Math.round(pct/100*8));
        const cls=pct>60?'rain-ex':pct>40?'rain-hi':pct>20?'rain-md':'rain-lo';
        return `<span class="${cls}">${blocks[i]}</span>`;
    }

    async function loadWeather(){
        const el=document.getElementById('weather-body');
        try{
            const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&hourly=precipitation_probability&temperature_unit=fahrenheit&timezone=${TZ}&forecast_days=1`;
            const data=await(await fetch(url)).json();
            const hi=Math.round(data.daily.temperature_2m_max[0]);
            const lo=Math.round(data.daily.temperature_2m_min[0]);
            const code=data.daily.weathercode[0];
            const rainMax=data.daily.precipitation_probability_max[0];
            const cond=WMO[code]||'Unknown';
            const icon=WMO_ART[code]||'?';
            const hourly=data.hourly.precipitation_probability.slice(0,24);
            let bars='';
            for(let i=6;i<=23;i++) bars+=rainBlock(hourly[i]);
            el.innerHTML=`
                <a class="wx-link" href="carrotweather://" onclick="window.location.href='carrotweather://';return false;">
                    <div class="wx-hero">
                        <span class="wx-icon">${icon}</span>
                        <div class="wx-info">
                            <div class="wx-condition">${esc(cond)}</div>
                            <div class="wx-temps">
                                <span>▲ <span class="wx-hi">${hi}°F</span></span>
                                <span>▼ <span class="wx-lo">${lo}°F</span></span>
                                <span>☂ <span class="wx-rain-pct">${rainMax}%</span></span>
                            </div>
                        </div>
                    </div>
                    <div class="rain-box">
                        <div class="rain-title">┌─ HOURLY RAIN % ─────────────────┐</div>
                        <div class="rain-chart">${bars}</div>
                        <div class="rain-labels">6a    9a    12p   3p    6p    9p</div>
                        <div class="rain-title">└─────────────────────────────────┘</div>
                    </div>
                </a>`;
        }catch(e){el.innerHTML=`<span class="error">✗ ${esc(e.message)}</span>`}
    }

    /* ═══ SHARED RENDERING ═══ */
    function scoreBarFill(score,maxScore,color){
        const pct=maxScore>0?(score/maxScore*100):0;
        return `<div class="score-bar-fill" style="width:${pct}%;background:${color}"></div>`;
    }

    function renderFinalCard(label,myAbbr,myCls,myScore,oppAbbr,oppScore,venue,isHome,extras){
        const won=myScore>oppScore;
        const maxS=Math.max(myScore,oppScore,1);
        const myColor=getComputedStyle(document.documentElement).getPropertyValue(myCls==='team-cin'?'--red':myCls==='team-lal'?'--violet':myCls==='team-uk'?'--blue':'--cyan').trim();
        let meta='';
        if(extras) meta+=extras;
        if(venue) meta+=`${extras?'<br>':''}<span class="venue">@ ${esc(venue)} (${isHome?'Home':'Away'})</span>`;
        return `<div class="game-card">
            <div class="game-card-head"><span>┌ ${esc(label)}</span><span>${won?'<span class="result-w">WIN</span>':'<span class="result-l">LOSS</span>'}</span></div>
            <div class="game-card-body">
                <div class="score-row"><span class="score-team ${myCls}">${esc(myAbbr)}</span><div class="score-bar-track">${scoreBarFill(myScore,maxS,`var(${myCls==='team-cin'?'--red':myCls==='team-lal'?'--violet':myCls==='team-uk'?'--blue':'--cyan'})`)}</div><span class="score-num ${myCls}">${myScore}</span></div>
                <div class="score-row"><span class="score-team team-opp">${esc(oppAbbr)}</span><div class="score-bar-track">${scoreBarFill(oppScore,maxS,'var(--fg-dim)')}</div><span class="score-num team-opp">${oppScore}</span></div>
                ${meta?`<div class="game-meta">${meta}</div>`:''}
            </div>
        </div>`;
    }

    function renderScheduledCard(myAbbr,myCls,oppAbbr,vs,time,venue,extras){
        return `<div class="game-card">
            <div class="game-card-head"><span>┌ UPCOMING</span><span class="time">${esc(time)}</span></div>
            <div class="game-card-body">
                <div class="matchup"><span class="${myCls}">${esc(myAbbr)}</span><span class="matchup-vs">${vs}</span><span class="team-opp">${esc(oppAbbr)}</span></div>
                <div class="matchup-venue">@ ${esc(venue)}</div>
                ${extras||''}
            </div>
        </div>`;
    }

    function renderLiveCard(myAbbr,myCls,myScore,oppAbbr,oppScore,detail){
        const maxS=Math.max(myScore,oppScore,1);
        return `<div class="game-card">
            <div class="game-card-head"><span>┌ LIVE</span><span class="time">${esc(detail)}</span></div>
            <div class="game-card-body">
                <div class="score-row"><span class="score-team ${myCls}">${esc(myAbbr)}</span><div class="score-bar-track">${scoreBarFill(myScore,maxS,`var(${myCls==='team-cin'?'--red':myCls==='team-lal'?'--violet':myCls==='team-uk'?'--blue':'--cyan'})`)}</div><span class="score-num ${myCls}">${myScore}</span></div>
                <div class="score-row"><span class="score-team team-opp">${esc(oppAbbr)}</span><div class="score-bar-track">${scoreBarFill(oppScore,maxS,'var(--fg-dim)')}</div><span class="score-num team-opp">${oppScore}</span></div>
            </div>
        </div>`;
    }

    /* ═══ MLB - REDS ═══ */
    const MLB_TEAMS={'Cincinnati Reds':'CIN','St. Louis Cardinals':'STL','Chicago Cubs':'CHC','Milwaukee Brewers':'MIL','Pittsburgh Pirates':'PIT','Atlanta Braves':'ATL','New York Mets':'NYM','Philadelphia Phillies':'PHI','Washington Nationals':'WSH','Miami Marlins':'MIA','Los Angeles Dodgers':'LAD','San Francisco Giants':'SF','San Diego Padres':'SD','Arizona Diamondbacks':'ARI','Colorado Rockies':'COL','New York Yankees':'NYY','Boston Red Sox':'BOS','Tampa Bay Rays':'TB','Toronto Blue Jays':'TOR','Baltimore Orioles':'BAL','Minnesota Twins':'MIN','Cleveland Guardians':'CLE','Chicago White Sox':'CWS','Detroit Tigers':'DET','Kansas City Royals':'KC','Houston Astros':'HOU','Texas Rangers':'TEX','Seattle Mariners':'SEA','Los Angeles Angels':'LAA','Oakland Athletics':'OAK'};
    const mlbAbbr=n=>MLB_TEAMS[n]||n.slice(0,3).toUpperCase();

    async function loadReds(){
        const sec=document.getElementById('reds-section');
        const el=document.getElementById('reds-body');
        try{
            const [yData,tData]=await Promise.all([
                fetch(`https://statsapi.mlb.com/api/v1/schedule?teamId=${REDS_ID}&date=${yesterdayStr()}&sportId=1&hydrate=probablePitcher,linescore,decisions,team`).then(r=>r.json()),
                fetch(`https://statsapi.mlb.com/api/v1/schedule?teamId=${REDS_ID}&date=${todayStr()}&sportId=1&hydrate=probablePitcher,linescore,decisions,team`).then(r=>r.json())
            ]);
            let html='';
            const yg=yData.dates?.[0]?.games?.[0];
            if(yg){
                const st=yg.status?.detailedState||'';
                if(st.startsWith('Final')||st==='Game Over'){
                    const isHome=yg.teams.home.team.id===REDS_ID;
                    const reds=isHome?yg.teams.home:yg.teams.away;
                    const opp=isHome?yg.teams.away:yg.teams.home;
                    const dec=yg.decisions||{};
                    let extras='';
                    if(dec.winner||dec.loser){
                        const p=[];
                        if(dec.winner) p.push(`<span class="result-w">W</span>: <span class="pitcher">${esc(dec.winner.fullName)}</span>`);
                        if(dec.loser) p.push(`<span class="result-l">L</span>: <span class="pitcher">${esc(dec.loser.fullName)}</span>`);
                        if(dec.save) p.push(`S: <span class="pitcher">${esc(dec.save.fullName)}</span>`);
                        extras=p.join(' · ');
                    }
                    html+=renderFinalCard('YESTERDAY','CIN','team-cin',reds.score??0,mlbAbbr(opp.team.name),opp.score??0,yg.venue?.name,isHome,extras);
                }
            }
            const tg=tData.dates?.[0]?.games?.[0];
            if(tg){
                const st=tg.status?.detailedState||'';
                if(st.startsWith('Final')||st==='Game Over'){
                    const isHome=tg.teams.home.team.id===REDS_ID;
                    const reds=isHome?tg.teams.home:tg.teams.away;
                    const opp=isHome?tg.teams.away:tg.teams.home;
                    html+=renderFinalCard('TODAY','CIN','team-cin',reds.score??0,mlbAbbr(opp.team.name),opp.score??0,tg.venue?.name,isHome,'');
                }else if(st==='In Progress'||st==='Warmup'||st.includes('Progress')){
                    const isHome=tg.teams.home.team.id===REDS_ID;
                    const reds=isHome?tg.teams.home:tg.teams.away;
                    const opp=isHome?tg.teams.away:tg.teams.home;
                    const inn=(tg.linescore?.inningHalf||'')+' '+(tg.linescore?.currentInningOrdinal||'');
                    html+=renderLiveCard('CIN','team-cin',reds.score??0,mlbAbbr(opp.team.name),opp.score??0,inn);
                }else{
                    const isHome=tg.teams.home.team.id===REDS_ID;
                    const opp=isHome?tg.teams.away:tg.teams.home;
                    const oppA=mlbAbbr(opp.team.name);
                    const vs=isHome?'vs':'@';
                    const time=new Date(tg.gameDate).toLocaleTimeString('en-US',{timeZone:TZ,hour:'numeric',minute:'2-digit'})+' ET';
                    const rP=isHome?tg.teams.home.probablePitcher:tg.teams.away.probablePitcher;
                    const oP=isHome?tg.teams.away.probablePitcher:tg.teams.home.probablePitcher;
                    let pitchers='';
                    if(rP||oP){
                        pitchers=`<div class="pitchers-box">
                            <div class="pitcher-row"><span class="pitcher-team team-cin">CIN</span><span class="pitcher-name">${rP?esc(rP.fullName):'TBD'}</span></div>
                            <div class="pitcher-row"><span class="pitcher-team team-opp">${esc(oppA)}</span><span class="pitcher-name">${oP?esc(oP.fullName):'TBD'}</span></div>
                        </div>`;
                    }
                    html+=renderScheduledCard('CIN','team-cin',oppA,vs,time,tg.venue?.name||'',pitchers);
                }
            }
            if(html){sec.classList.remove('hidden');el.innerHTML=html}
            else{sec.classList.add('hidden')}
        }catch(e){sec.classList.remove('hidden');el.innerHTML=`<span class="error">✗ ${esc(e.message)}</span>`}
    }

    /* ═══ ESPN GENERIC LOADER ═══ */
    function findTeamGame(data,teamId){
        if(!data?.events) return null;
        for(const ev of data.events){
            const comp=ev.competitions?.[0];
            if(!comp) continue;
            if(comp.competitors.some(c=>c.team.id===teamId)) return comp;
        }
        return null;
    }

    function espnGameCard(comp,teamId,myAbbr,myCls,label){
        const my=comp.competitors.find(c=>c.team.id===teamId);
        const opp=comp.competitors.find(c=>c.team.id!==teamId);
        const oppA=opp.team.abbreviation;
        const st=comp.status?.type;
        const isHome=my.homeAway==='home';
        const venue=comp.venue?.fullName||'';

        if(st?.completed){
            const myS=parseInt(my.score)||0,oppS=parseInt(opp.score)||0;
            return renderFinalCard(label,myAbbr,myCls,myS,oppA,oppS,venue,isHome,'');
        }else if(st?.state==='in'){
            const myS=parseInt(my.score)||0,oppS=parseInt(opp.score)||0;
            return renderLiveCard(myAbbr,myCls,myS,oppA,oppS,st.shortDetail||'');
        }else{
            const vs=isHome?'vs':'@';
            const time=new Date(comp.date).toLocaleTimeString('en-US',{timeZone:TZ,hour:'numeric',minute:'2-digit'})+' ET';
            let extras='';
            if(comp.odds?.[0]?.details){
                extras=`<div class="game-meta" style="text-align:center;margin-top:6px"><span class="time">${esc(comp.odds[0].details)}</span></div>`;
            }
            return renderScheduledCard(myAbbr,myCls,oppA,vs,time,venue,extras);
        }
    }

    /* Day-by-day sports (Reds already handled, Lakers) */
    async function loadESPNDaily(sport,league,teamId,myAbbr,myCls,sectionId,bodyId){
        const sec=document.getElementById(sectionId);
        const el=document.getElementById(bodyId);
        try{
            const yDate=yesterdayStr().replace(/-/g,'');
            const tDate=todayStr().replace(/-/g,'');
            const [yData,tData]=await Promise.all([
                fetch(`https://site.api.espn.com/apis/site/v2/sports/${sport}/${league}/scoreboard?dates=${yDate}`).then(r=>r.json()),
                fetch(`https://site.api.espn.com/apis/site/v2/sports/${sport}/${league}/scoreboard?dates=${tDate}`).then(r=>r.json())
            ]);
            let html='';
            const yComp=findTeamGame(yData,teamId);
            if(yComp) html+=espnGameCard(yComp,teamId,myAbbr,myCls,'YESTERDAY');
            const tComp=findTeamGame(tData,teamId);
            if(tComp) html+=espnGameCard(tComp,teamId,myAbbr,myCls,'TODAY');
            if(html){sec.classList.remove('hidden');el.innerHTML=html}
            else{sec.classList.add('hidden')}
        }catch(e){sec.classList.remove('hidden');el.innerHTML=`<span class="error">✗ ${esc(e.message)}</span>`}
    }

    /* Weekly sports (Dolphins, UK Basketball, UK Football) */
    async function loadESPNWeekly(sport,league,teamId,myAbbr,myCls,sectionId,bodyId){
        const sec=document.getElementById(sectionId);
        const el=document.getElementById(bodyId);
        try{
            const startDate=dateOffset(-7);
            const endDate=dateOffset(7);
            const url=`https://site.api.espn.com/apis/site/v2/sports/${sport}/${league}/scoreboard?dates=${startDate}-${endDate}`;
            const data=await(await fetch(url)).json();
            let pastGames=[];
            let futureGames=[];
            const nowMs=Date.now();
            if(data?.events){
                for(const ev of data.events){
                    const comp=ev.competitions?.[0];
                    if(!comp) continue;
                    if(!comp.competitors.some(c=>c.team.id===teamId)) continue;
                    const gameDate=new Date(comp.date).getTime();
                    const st=comp.status?.type;
                    if(st?.completed) pastGames.push({comp,date:gameDate});
                    else if(st?.state==='in') futureGames.unshift({comp,date:gameDate});
                    else futureGames.push({comp,date:gameDate});
                }
            }
            // Sort: most recent past first, nearest future first
            pastGames.sort((a,b)=>b.date-a.date);
            futureGames.sort((a,b)=>a.date-b.date);

            let html='';
            if(pastGames.length>0){
                const pg=pastGames[0];
                const daysAgo=Math.round((nowMs-pg.date)/(86400000));
                const label=daysAgo<=1?'YESTERDAY':`${daysAgo} DAYS AGO`;
                html+=espnGameCard(pg.comp,teamId,myAbbr,myCls,label);
            }
            if(futureGames.length>0){
                const fg=futureGames[0];
                const st=fg.comp.status?.type;
                if(st?.state==='in'){
                    html+=espnGameCard(fg.comp,teamId,myAbbr,myCls,'LIVE');
                }else{
                    const daysOut=Math.round((fg.date-nowMs)/(86400000));
                    const gDate=new Date(fg.comp.date).toLocaleDateString('en-US',{timeZone:TZ,weekday:'short',month:'short',day:'numeric'});
                    html+=espnGameCard(fg.comp,teamId,myAbbr,myCls,gDate.toUpperCase());
                }
            }
            if(html){sec.classList.remove('hidden');el.innerHTML=html}
            else{sec.classList.add('hidden')}
        }catch(e){
            // If no season/no data, just hide
            sec.classList.add('hidden');
        }
    }

    /* ═══ CALENDAR (iCal / .ics feeds) ═══ */
    // Add your iCloud and Outlook public calendar .ics URLs here
    const CAL_FEEDS = [
        // { name: 'iCloud', url: 'https://p123-caldav.icloud.com/published/2/YOUR_ID', color: 'var(--cyan)' },
        // { name: 'Outlook', url: 'https://outlook.office365.com/owa/calendar/YOUR_ID/reachcalendar.ics', color: 'var(--blue)' },
    ];

    function parseICS(text) {
        const events = [];
        const blocks = text.split('BEGIN:VEVENT');
        for (let i = 1; i < blocks.length; i++) {
            const b = blocks[i].split('END:VEVENT')[0];
            const get = (key) => {
                // Handle folded lines (RFC 5545: continuation lines start with space/tab)
                const unfolded = b.replace(/\r?\n[ \t]/g, '');
                const m = unfolded.match(new RegExp('^' + key + '[;:](.*)$', 'm'));
                return m ? m[1] : null;
            };
            const parseDate = (val) => {
                if (!val) return null;
                // Strip TZID parameter prefix if present
                const v = val.replace(/^.*:/, '');
                if (v.length === 8) return { date: new Date(v.slice(0,4)+'-'+v.slice(4,6)+'-'+v.slice(6,8)), allDay: true };
                // Parse YYYYMMDDTHHMMSSZ or YYYYMMDDTHHMMSS
                const y=v.slice(0,4),mo=v.slice(4,6),d=v.slice(6,8),h=v.slice(9,11),mi=v.slice(11,13),s=v.slice(13,15);
                const isUTC = v.endsWith('Z');
                const dt = isUTC ? new Date(Date.UTC(+y,+mo-1,+d,+h,+mi,+s)) : new Date(+y,+mo-1,+d,+h,+mi,+s);
                return { date: dt, allDay: false };
            };
            const summary = (get('SUMMARY') || '').replace(/\\,/g, ',').replace(/\\n/g, ' ').replace(/\\;/g, ';');
            const location = (get('LOCATION') || '').replace(/\\,/g, ',').replace(/\\n/g, ' ').replace(/\\;/g, ';');
            const start = parseDate(get('DTSTART'));
            const end = parseDate(get('DTEND'));
            if (summary && start) events.push({ summary, location, start: start.date, end: end?.date, allDay: start.allDay });
        }
        return events;
    }

    function isToday(date) {
        const now = new Date();
        const d = new Date(date);
        return d.toLocaleDateString('en-CA', { timeZone: TZ }) === now.toLocaleDateString('en-CA', { timeZone: TZ });
    }

    function isNow(start, end) {
        const now = Date.now();
        return start.getTime() <= now && end && end.getTime() > now;
    }

    function isPast(end) {
        return end && end.getTime() < Date.now();
    }

    async function loadCalendar() {
        const sec = document.getElementById('calendar-section');
        const el = document.getElementById('calendar-body');

        if (CAL_FEEDS.length === 0) {
            sec.classList.remove('hidden');
            el.innerHTML = `<div class="cal-setup">
                <span class="none">No calendar feeds configured.</span><br><br>
                To add calendars, edit the <code>CAL_FEEDS</code> array in dashboard.html with your .ics URLs:<br><br>
                <strong>iCloud:</strong> Calendar app → tap calendar name → Share Calendar → Public Calendar → copy URL<br><br>
                <strong>Outlook:</strong> outlook.com → Settings → Calendar → Shared calendars → Publish → copy ICS link
            </div>`;
            return;
        }

        try {
            const allEvents = [];
            const results = await Promise.allSettled(
                CAL_FEEDS.map(f => fetch(f.url).then(r => r.text()).then(t => ({ feed: f, events: parseICS(t) })))
            );
            for (const r of results) {
                if (r.status === 'fulfilled') {
                    for (const ev of r.value.events) {
                        ev.color = r.value.feed.color;
                        ev.calName = r.value.feed.name;
                        allEvents.push(ev);
                    }
                }
            }
            // Filter to today's events
            const todayEvents = allEvents.filter(ev => isToday(ev.start));
            todayEvents.sort((a, b) => {
                if (a.allDay && !b.allDay) return -1;
                if (!a.allDay && b.allDay) return 1;
                return a.start.getTime() - b.start.getTime();
            });

            if (todayEvents.length === 0) {
                sec.classList.remove('hidden');
                el.innerHTML = '<span class="none">No events today</span>';
                return;
            }

            sec.classList.remove('hidden');
            let html = '';
            for (const ev of todayEvents) {
                const now = ev.end && !ev.allDay ? isNow(ev.start, ev.end) : false;
                const past = !ev.allDay && isPast(ev.end);
                let cls = 'cal-event';
                if (ev.allDay) cls += ' cal-allday';
                if (now) cls += ' cal-now';
                if (past) cls += ' cal-past';

                let timeStr;
                if (ev.allDay) {
                    timeStr = 'ALL DAY';
                } else {
                    const startT = ev.start.toLocaleTimeString('en-US', { timeZone: TZ, hour: 'numeric', minute: '2-digit' });
                    const endT = ev.end ? ev.end.toLocaleTimeString('en-US', { timeZone: TZ, hour: 'numeric', minute: '2-digit' }) : '';
                    timeStr = endT ? `${startT} – ${endT}` : startT;
                }

                html += `<div class="${cls}" style="border-left-color:${ev.color || 'var(--cyan)'}">
                    <div class="cal-time">${now ? '▸ ' : ''}${esc(timeStr)}</div>
                    <div class="cal-title">${esc(ev.summary)}</div>
                    ${ev.location ? `<div class="cal-loc">${esc(ev.location)}</div>` : ''}
                </div>`;
            }
            el.innerHTML = html;
        } catch (e) {
            sec.classList.remove('hidden');
            el.innerHTML = `<span class="error">✗ ${esc(e.message)}</span>`;
        }
    }

    /* ═══ INIT ═══ */
    function loadAll(){
        renderHeader();
        loadWeather();
        loadCalendar();
        loadReds();
        loadESPNDaily('basketball','nba',ESPN.LAKERS,'LAL','team-lal','lakers-section','lakers-body');
        loadESPNWeekly('football','nfl',ESPN.DOLPHINS,'MIA','team-mia','dolphins-section','dolphins-body');
        loadESPNWeekly('basketball','mens-college-basketball',ESPN.UK_BBALL,'UK','team-uk','ukbball-section','ukbball-body');
        loadESPNWeekly('football','college-football',ESPN.UK_FBALL,'UK','team-uk','ukfball-section','ukfball-body');
    }
    loadAll();

    if('serviceWorker' in navigator){navigator.serviceWorker.register('dashboard-sw.js').catch(()=>{})}
