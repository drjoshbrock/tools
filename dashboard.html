<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Morning Dashboard</title>
    <meta name="description" content="Morning dashboard with weather and Reds updates">
    <meta name="theme-color" content="#002b36" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#fdf6e3" media="(prefers-color-scheme: light)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dashboard">
    <link rel="manifest" href="dashboard-manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23002b36' width='100' height='100' rx='20'/><text x='50' y='68' text-anchor='middle' font-size='50' font-family='monospace' fill='%2393a1a1'>▸_</text></svg>">
    <style>
        :root {
            --base03:  #002b36; --base02:  #073642;
            --base01:  #586e75; --base00:  #657b83;
            --base0:   #839496; --base1:   #93a1a1;
            --base2:   #eee8d5; --base3:   #fdf6e3;
            --yellow:  #b58900; --orange:  #cb4b16;
            --red:     #dc322f; --magenta: #d33682;
            --violet:  #6c71c4; --blue:    #268bd2;
            --cyan:    #2aa198; --green:   #859900;

            --bg:      var(--base03);  --bg-hl:   var(--base02);
            --fg:      var(--base0);   --fg-dim:  var(--base01);
            --fg-em:   var(--base1);   --border:  var(--base01);
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg:     var(--base3);   --bg-hl:  var(--base2);
                --fg:     var(--base00);  --fg-dim: var(--base1);
                --fg-em:  var(--base01);  --border: var(--base1);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
            background: var(--bg);
            color: var(--fg);
            font-size: 12px;
            line-height: 1.4;
            min-height: 100vh;
            min-height: 100dvh;
            padding: env(safe-area-inset-top) 8px 8px 8px;
            -webkit-text-size-adjust: 100%;
        }

        /* ═══ TERMINAL FRAME ═══ */
        .term {
            border: 1px solid var(--border);
            max-width: 480px;
            margin: 0 auto;
            overflow: hidden;
        }

        /* ─── TITLE BAR ─── */
        .titlebar {
            background: var(--bg-hl);
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .titlebar-left {
            color: var(--green);
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .titlebar-left .prompt { color: var(--cyan); }
        .titlebar-right {
            color: var(--fg-dim);
            font-size: 11px;
            text-align: right;
        }
        .titlebar-right .date { color: var(--yellow); }

        /* ─── SECTION ─── */
        .section {
            border-top: 1px solid var(--border);
        }
        .section-head {
            background: var(--bg-hl);
            padding: 6px 12px;
            border-bottom: 1px solid var(--border);
            color: var(--blue);
            font-weight: bold;
            font-size: 11px;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }
        .section-head .label { color: var(--blue); }
        .section-head .sub { color: var(--fg-dim); font-weight: normal; letter-spacing: 0; }
        .section-body {
            padding: 10px 12px;
        }

        /* ─── WEATHER ─── */
        .wx-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 6px;
        }
        .wx-icon {
            font-size: 13px;
            line-height: 1;
        }
        .wx-condition { color: var(--yellow); font-weight: bold; }
        .wx-temps {
            display: flex;
            gap: 14px;
            margin-bottom: 8px;
        }
        .wx-hi { color: var(--orange); font-weight: bold; }
        .wx-lo { color: var(--blue); font-weight: bold; }
        .wx-rain-pct { color: var(--cyan); }

        /* Rain chart */
        .rain-box {
            border: 1px solid var(--border);
            padding: 6px 8px;
            margin-top: 8px;
        }
        .rain-title {
            color: var(--fg-dim);
            font-size: 10px;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .rain-chart {
            white-space: pre;
            line-height: 1.2;
            font-size: 12px;
        }
        .rain-labels {
            color: var(--fg-dim);
            font-size: 10px;
            white-space: pre;
        }
        .rain-lo  { color: var(--green); }
        .rain-md  { color: var(--yellow); }
        .rain-hi  { color: var(--orange); }
        .rain-ex  { color: var(--red); }

        /* ─── BASEBALL ─── */
        .game-card {
            border: 1px solid var(--border);
            margin-bottom: 8px;
            overflow: hidden;
        }
        .game-card:last-child { margin-bottom: 0; }
        .game-card-head {
            background: var(--bg-hl);
            padding: 4px 8px;
            border-bottom: 1px solid var(--border);
            color: var(--fg-dim);
            font-size: 10px;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
        }
        .game-card-body {
            padding: 8px;
        }

        /* Score display */
        .score-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 3px;
            font-size: 12px;
        }
        .score-team {
            width: 30px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .score-bar-track {
            flex: 1;
            height: 12px;
            background: var(--bg-hl);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .score-bar-fill {
            height: 100%;
            transition: width 0.3s;
        }
        .score-num {
            width: 16px;
            text-align: right;
            font-weight: bold;
            flex-shrink: 0;
        }
        .team-cin { color: var(--red); }
        .team-opp { color: var(--fg-em); }

        .game-meta {
            color: var(--fg-dim);
            font-size: 11px;
            margin-top: 6px;
            line-height: 1.5;
        }
        .game-meta .pitcher { color: var(--violet); }
        .game-meta .result-w { color: var(--green); font-weight: bold; }
        .game-meta .result-l { color: var(--red); font-weight: bold; }
        .game-meta .time { color: var(--yellow); }
        .game-meta .venue { color: var(--fg-dim); }

        /* Matchup display for today's game */
        .matchup {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 4px 0 6px;
            font-size: 13px;
        }
        .matchup-vs {
            color: var(--fg-dim);
            font-size: 10px;
        }
        .matchup-time {
            text-align: center;
            color: var(--yellow);
            font-size: 12px;
            margin-bottom: 6px;
        }
        .matchup-venue {
            text-align: center;
            color: var(--fg-dim);
            font-size: 10px;
            margin-bottom: 8px;
        }

        .pitchers-box {
            border-top: 1px dashed var(--border);
            padding-top: 6px;
            margin-top: 2px;
        }
        .pitcher-row {
            display: flex;
            gap: 6px;
            font-size: 11px;
            margin-bottom: 2px;
        }
        .pitcher-team {
            width: 30px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .pitcher-name { color: var(--violet); }

        /* ─── FOOTER ─── */
        .foot {
            border-top: 1px solid var(--border);
            background: var(--bg-hl);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .foot-time { color: var(--fg-dim); font-size: 10px; }
        .refresh-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--cyan);
            font-family: inherit;
            font-size: 11px;
            padding: 3px 12px;
            cursor: pointer;
        }
        .refresh-btn:active {
            background: var(--bg);
        }

        /* ─── STATES ─── */
        .loading {
            color: var(--fg-dim);
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        .error { color: var(--red); font-size: 11px; }
        .none { color: var(--fg-dim); font-style: italic; }
    </style>
</head>
<body>
    <div class="term">
        <div class="titlebar">
            <div class="titlebar-left"><span class="prompt">▸</span> morning-dashboard</div>
            <div class="titlebar-right" id="titlebar-right"></div>
        </div>
        <div id="weather-section" class="section">
            <div class="section-head">
                <span class="label">WEATHER</span>
                <span class="sub">Prospect, KY</span>
            </div>
            <div class="section-body" id="weather-body">
                <span class="loading">loading...</span>
            </div>
        </div>
        <div id="reds-section" class="section">
            <div class="section-head">
                <span class="label">REDS</span>
                <span class="sub">Cincinnati</span>
            </div>
            <div class="section-body" id="reds-body">
                <span class="loading">loading...</span>
            </div>
        </div>
        <div class="foot">
            <span class="foot-time" id="foot-time"></span>
            <button class="refresh-btn" onclick="loadAll()">[ refresh ]</button>
        </div>
    </div>

    <script>
    /* ═══════════════════════════════════
       CONFIG
       ═══════════════════════════════════ */
    const LAT = 38.40, LON = -85.61;
    const REDS_ID = 113;
    const TZ = 'America/New_York';

    /* ═══════════════════════════════════
       UTILS
       ═══════════════════════════════════ */
    const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
    const todayStr = () => new Date().toLocaleDateString('en-CA', { timeZone: TZ });
    const yesterdayStr = () => { const d = new Date(); d.setDate(d.getDate() - 1); return d.toLocaleDateString('en-CA', { timeZone: TZ }); };

    function renderHeader() {
        const now = new Date();
        const date = now.toLocaleDateString('en-US', { timeZone: TZ, weekday: 'short', month: 'short', day: 'numeric' });
        const time = now.toLocaleTimeString('en-US', { timeZone: TZ, hour: 'numeric', minute: '2-digit' });
        document.getElementById('titlebar-right').innerHTML =
            `<span class="date">${esc(date)}</span> · ${esc(time)}`;
        document.getElementById('foot-time').textContent = `refreshed ${time}`;
    }

    /* ═══════════════════════════════════
       WEATHER
       ═══════════════════════════════════ */
    const WMO = {
        0:'Clear',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',
        45:'Fog',48:'Fog',51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',
        56:'Freezing Drizzle',57:'Freezing Drizzle',
        61:'Light Rain',63:'Rain',65:'Heavy Rain',66:'Freezing Rain',67:'Freezing Rain',
        71:'Light Snow',73:'Snow',75:'Heavy Snow',77:'Snow Grains',
        80:'Light Showers',81:'Showers',82:'Heavy Showers',85:'Snow Showers',86:'Snow Showers',
        95:'Thunderstorm',96:'T-Storm + Hail',99:'T-Storm + Hail'
    };
    const WMO_ART = {
        0:'☀',1:'🌤',2:'⛅',3:'☁',45:'🌫',48:'🌫',
        51:'🌦',53:'🌦',55:'🌧',56:'🌧',57:'🌧',
        61:'🌦',63:'🌧',65:'🌧',66:'🌧',67:'🌧',
        71:'🌨',73:'🌨',75:'❄',77:'❄',80:'🌦',81:'🌧',82:'⛈',
        85:'🌨',86:'❄',95:'⛈',96:'⛈',99:'⛈'
    };

    function rainBlock(pct) {
        const blocks = ' ▁▂▃▄▅▆▇█';
        const i = Math.min(8, Math.round(pct / 100 * 8));
        const cls = pct > 60 ? 'rain-ex' : pct > 40 ? 'rain-hi' : pct > 20 ? 'rain-md' : 'rain-lo';
        return `<span class="${cls}">${blocks[i]}</span>`;
    }

    async function loadWeather() {
        const el = document.getElementById('weather-body');
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`
                + `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode`
                + `&hourly=precipitation_probability`
                + `&temperature_unit=fahrenheit&timezone=${TZ}&forecast_days=1`;
            const data = await (await fetch(url)).json();

            const hi = Math.round(data.daily.temperature_2m_max[0]);
            const lo = Math.round(data.daily.temperature_2m_min[0]);
            const code = data.daily.weathercode[0];
            const rainMax = data.daily.precipitation_probability_max[0];
            const cond = WMO[code] || 'Unknown';
            const icon = WMO_ART[code] || '?';
            const hourly = data.hourly.precipitation_probability.slice(0, 24);

            // Build rain chart — show 6AM to 11PM (indices 6-23)
            let bars = '';
            for (let i = 6; i <= 23; i++) bars += rainBlock(hourly[i]);

            el.innerHTML = `
                <div class="wx-row">
                    <span class="wx-icon">${icon}</span>
                    <span class="wx-condition">${esc(cond)}</span>
                </div>
                <div class="wx-temps">
                    <span>▲ <span class="wx-hi">${hi}°F</span></span>
                    <span>▼ <span class="wx-lo">${lo}°F</span></span>
                    <span>☂ <span class="wx-rain-pct">${rainMax}%</span></span>
                </div>
                <div class="rain-box">
                    <div class="rain-title">┌─ HOURLY RAIN % ──────────────┐</div>
                    <div class="rain-chart">${bars}</div>
                    <div class="rain-labels">6a    9a    12p   3p    6p   9p</div>
                    <div class="rain-title">└──────────────────────────────┘</div>
                </div>`;
        } catch (e) {
            el.innerHTML = `<span class="error">✗ ${esc(e.message)}</span>`;
        }
    }

    /* ═══════════════════════════════════
       REDS
       ═══════════════════════════════════ */
    const TEAMS = {
        'Cincinnati Reds':'CIN','St. Louis Cardinals':'STL','Chicago Cubs':'CHC',
        'Milwaukee Brewers':'MIL','Pittsburgh Pirates':'PIT','Atlanta Braves':'ATL',
        'New York Mets':'NYM','Philadelphia Phillies':'PHI','Washington Nationals':'WSH',
        'Miami Marlins':'MIA','Los Angeles Dodgers':'LAD','San Francisco Giants':'SF',
        'San Diego Padres':'SD','Arizona Diamondbacks':'ARI','Colorado Rockies':'COL',
        'New York Yankees':'NYY','Boston Red Sox':'BOS','Tampa Bay Rays':'TB',
        'Toronto Blue Jays':'TOR','Baltimore Orioles':'BAL','Minnesota Twins':'MIN',
        'Cleveland Guardians':'CLE','Chicago White Sox':'CWS','Detroit Tigers':'DET',
        'Kansas City Royals':'KC','Houston Astros':'HOU','Texas Rangers':'TEX',
        'Seattle Mariners':'SEA','Los Angeles Angels':'LAA','Oakland Athletics':'OAK',
    };
    const abbr = name => TEAMS[name] || name.slice(0,3).toUpperCase();

    function scoreBar(runs, maxRuns, isReds) {
        const pct = maxRuns > 0 ? (runs / maxRuns * 100) : 0;
        const color = isReds ? 'var(--red)' : 'var(--fg-dim)';
        const teamCls = isReds ? 'team-cin' : 'team-opp';
        const team = isReds ? 'CIN' : '';
        return `<div class="score-bar-fill" style="width:${pct}%;background:${color}"></div>`;
    }

    function renderFinalGame(game, label) {
        const isHome = game.teams.home.team.id === REDS_ID;
        const reds = isHome ? game.teams.home : game.teams.away;
        const opp = isHome ? game.teams.away : game.teams.home;
        const redsR = reds.score ?? 0;
        const oppR = opp.score ?? 0;
        const oppAbbr = abbr(opp.team.name);
        const won = redsR > oppR;
        const maxR = Math.max(redsR, oppR, 1);
        const dec = game.decisions || {};

        let metaHtml = '';
        if (dec.winner || dec.loser) {
            const parts = [];
            if (dec.winner) parts.push(`<span class="result-w">W</span>: <span class="pitcher">${esc(dec.winner.fullName)}</span>`);
            if (dec.loser) parts.push(`<span class="result-l">L</span>: <span class="pitcher">${esc(dec.loser.fullName)}</span>`);
            if (dec.save) parts.push(`S: <span class="pitcher">${esc(dec.save.fullName)}</span>`);
            metaHtml += parts.join(' · ');
        }
        if (game.venue?.name) {
            const ha = isHome ? 'Home' : 'Away';
            metaHtml += `<br><span class="venue">@ ${esc(game.venue.name)} (${ha})</span>`;
        }

        return `
            <div class="game-card">
                <div class="game-card-head">
                    <span>┌ ${esc(label)}</span>
                    <span>${won ? '<span class="result-w">WIN</span>' : '<span class="result-l">LOSS</span>'}</span>
                </div>
                <div class="game-card-body">
                    <div class="score-row">
                        <span class="score-team team-cin">CIN</span>
                        <div class="score-bar-track">${scoreBar(redsR, maxR, true)}</div>
                        <span class="score-num team-cin">${redsR}</span>
                    </div>
                    <div class="score-row">
                        <span class="score-team team-opp">${esc(oppAbbr)}</span>
                        <div class="score-bar-track">${scoreBar(oppR, maxR, false)}</div>
                        <span class="score-num team-opp">${oppR}</span>
                    </div>
                    <div class="game-meta">${metaHtml}</div>
                </div>
            </div>`;
    }

    function renderScheduledGame(game) {
        const isHome = game.teams.home.team.id === REDS_ID;
        const opp = isHome ? game.teams.away : game.teams.home;
        const oppAbbr = abbr(opp.team.name);
        const vs = isHome ? 'vs' : '@';
        const time = new Date(game.gameDate).toLocaleTimeString('en-US', {
            timeZone: TZ, hour: 'numeric', minute: '2-digit'
        });
        const venue = game.venue?.name || '';

        const redsPitcher = isHome ? game.teams.home.probablePitcher : game.teams.away.probablePitcher;
        const oppPitcher = isHome ? game.teams.away.probablePitcher : game.teams.home.probablePitcher;

        let pitcherHtml = '';
        if (redsPitcher || oppPitcher) {
            pitcherHtml = `
                <div class="pitchers-box">
                    <div class="pitcher-row">
                        <span class="pitcher-team team-cin">CIN</span>
                        <span class="pitcher-name">${redsPitcher ? esc(redsPitcher.fullName) : 'TBD'}</span>
                    </div>
                    <div class="pitcher-row">
                        <span class="pitcher-team team-opp">${esc(oppAbbr)}</span>
                        <span class="pitcher-name">${oppPitcher ? esc(oppPitcher.fullName) : 'TBD'}</span>
                    </div>
                </div>`;
        }

        return `
            <div class="game-card">
                <div class="game-card-head">
                    <span>┌ TODAY</span>
                    <span class="time">${esc(time)} ET</span>
                </div>
                <div class="game-card-body">
                    <div class="matchup">
                        <span class="team-cin" style="font-weight:bold;font-size:15px">CIN</span>
                        <span class="matchup-vs">${vs}</span>
                        <span class="team-opp" style="font-weight:bold;font-size:15px">${esc(oppAbbr)}</span>
                    </div>
                    <div class="matchup-venue">@ ${esc(venue)}</div>
                    ${pitcherHtml}
                </div>
            </div>`;
    }

    function renderLiveGame(game) {
        const isHome = game.teams.home.team.id === REDS_ID;
        const reds = isHome ? game.teams.home : game.teams.away;
        const opp = isHome ? game.teams.away : game.teams.home;
        const redsR = reds.score ?? 0;
        const oppR = opp.score ?? 0;
        const oppAbbr = abbr(opp.team.name);
        const maxR = Math.max(redsR, oppR, 1);
        const inning = game.linescore?.currentInningOrdinal || '';
        const halfInning = game.linescore?.inningHalf || '';

        return `
            <div class="game-card">
                <div class="game-card-head">
                    <span>┌ LIVE</span>
                    <span class="time">${esc(halfInning)} ${esc(inning)}</span>
                </div>
                <div class="game-card-body">
                    <div class="score-row">
                        <span class="score-team team-cin">CIN</span>
                        <div class="score-bar-track">${scoreBar(redsR, maxR, true)}</div>
                        <span class="score-num team-cin">${redsR}</span>
                    </div>
                    <div class="score-row">
                        <span class="score-team team-opp">${esc(oppAbbr)}</span>
                        <div class="score-bar-track">${scoreBar(oppR, maxR, false)}</div>
                        <span class="score-num team-opp">${oppR}</span>
                    </div>
                </div>
            </div>`;
    }

    async function loadReds() {
        const el = document.getElementById('reds-body');
        try {
            const [yData, tData] = await Promise.all([
                fetch(`https://statsapi.mlb.com/api/v1/schedule?teamId=${REDS_ID}&date=${yesterdayStr()}&sportId=1&hydrate=probablePitcher,linescore,decisions,team`).then(r => r.json()),
                fetch(`https://statsapi.mlb.com/api/v1/schedule?teamId=${REDS_ID}&date=${todayStr()}&sportId=1&hydrate=probablePitcher,linescore,decisions,team`).then(r => r.json())
            ]);

            let html = '';

            // Yesterday
            const yGames = yData.dates?.[0]?.games || [];
            if (yGames.length > 0) {
                const yg = yGames[0];
                const st = yg.status?.detailedState || '';
                if (st.startsWith('Final') || st === 'Game Over') {
                    html += renderFinalGame(yg, 'YESTERDAY');
                } else {
                    html += `<div class="game-card"><div class="game-card-head"><span>┌ YESTERDAY</span></div><div class="game-card-body"><span class="none">${esc(st || 'No result')}</span></div></div>`;
                }
            } else {
                html += `<div class="game-card"><div class="game-card-head"><span>┌ YESTERDAY</span></div><div class="game-card-body"><span class="none">No game</span></div></div>`;
            }

            // Today
            const tGames = tData.dates?.[0]?.games || [];
            if (tGames.length > 0) {
                const tg = tGames[0];
                const st = tg.status?.detailedState || '';
                if (st.startsWith('Final') || st === 'Game Over') {
                    html += renderFinalGame(tg, 'TODAY — FINAL');
                } else if (st === 'In Progress' || st === 'Warmup' || st.includes('Progress')) {
                    html += renderLiveGame(tg);
                } else {
                    html += renderScheduledGame(tg);
                }
            } else {
                html += `<div class="game-card"><div class="game-card-head"><span>┌ TODAY</span></div><div class="game-card-body"><span class="none">No game scheduled</span></div></div>`;
            }

            el.innerHTML = html;
        } catch (e) {
            el.innerHTML = `<span class="error">✗ ${esc(e.message)}</span>`;
        }
    }

    /* ═══════════════════════════════════
       INIT
       ═══════════════════════════════════ */
    function loadAll() {
        renderHeader();
        loadWeather();
        loadReds();
    }
    loadAll();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('dashboard-sw.js').catch(() => {});
    }
    </script>
